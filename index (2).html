<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0392b;
      --red-glow: #e74c3c;
      --dim-red: #7b1c14;
      --bg: #080808;
      --tick: #1a1a1a;
      --text: #ccc;
      --muted: #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .scene {
      text-align: center;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
    }

    .header-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.5em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Clock face */
    .clock-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clock-svg-container {
      position: relative;
      width: clamp(280px, 50vw, 520px);
      height: clamp(280px, 50vw, 520px);
    }

    .clock-svg-container svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Glow ring pulse */
    @keyframes glowPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .glow-ring {
      animation: glowPulse 3s ease-in-out infinite;
    }

    /* Sweep hand animation handled by JS */
    .sweep-hand {
      transform-origin: 250px 250px;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Tick mark flash */
    @keyframes tickFlash {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .countdown-display {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .big-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 1;
      color: var(--red-glow);
      text-shadow:
        0 0 20px var(--red),
        0 0 60px var(--dim-red),
        0 0 120px rgba(192, 57, 43, 0.3);
      letter-spacing: -0.02em;
    }

    .unit-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--dim-red);
      letter-spacing: 0.15em;
      align-self: flex-end;
      padding-bottom: 0.8rem;
    }

    .to-midnight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 0.35em;
      color: var(--red);
      text-shadow: 0 0 30px var(--dim-red);
      opacity: 0.85;
    }

    .footer-text {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      opacity: 0.5;
      margin-top: 1rem;
    }

    /* Blinking colon */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .blink {
      animation: blink 1s step-start infinite;
      color: var(--dim-red);
    }

    /* Atmospheric scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 98;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <div class="scene">
    <div class="header-label">Bulletin of the Atomic Scientists</div>

    <div class="clock-svg-container">
      <svg viewBox="0 0 500 500" id="clockSvg">
        <defs>
          <filter id="redGlow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a0a08"/>
            <stop offset="100%" stop-color="#050303"/>
          </radialGradient>
        </defs>

        <!-- Outer ambient glow -->
        <circle cx="250" cy="250" r="230" fill="none" stroke="#7b1c14" stroke-width="1" opacity="0.15" class="glow-ring" filter="url(#redGlow)"/>

        <!-- Clock face -->
        <circle cx="250" cy="250" r="215" fill="url(#faceGrad)" stroke="#1e1e1e" stroke-width="1.5"/>

        <!-- Outer ring -->
        <circle cx="250" cy="250" r="212" fill="none" stroke="#2a0f0c" stroke-width="3"/>
        <circle cx="250" cy="250" r="205" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

        <!-- Tick marks -->
        <g id="tickMarks"></g>

        <!-- Progress arc (filled from 12 o'clock toward midnight based on danger) -->
        <path id="progressArc" fill="none" stroke="#c0392b" stroke-width="8" stroke-linecap="round" opacity="0.6" filter="url(#softGlow)"/>

        <!-- Minute markers near midnight (11, 12) zone highlight -->
        <path d="M 250 40 A 210 210 0 0 1 460 250" fill="none" stroke="#7b1c14" stroke-width="14" opacity="0.08" stroke-linecap="round"/>

        <!-- Hour hand -->
        <line id="hourHand"
          x1="250" y1="250"
          x2="250" y2="100"
          stroke="#888" stroke-width="5" stroke-linecap="round"
          transform="rotate(0, 250, 250)"/>

        <!-- Minute hand — points toward midnight -->
        <line id="minuteHand"
          x1="250" y1="265"
          x2="250" y2="60"
          stroke="#c0392b" stroke-width="4" stroke-linecap="round"
          filter="url(#redGlow)"
          transform="rotate(0, 250, 250)"/>

        <!-- Center cap -->
        <circle cx="250" cy="250" r="10" fill="#c0392b" filter="url(#redGlow)"/>
        <circle cx="250" cy="250" r="5" fill="#ff6b5b"/>

        <!-- XII marker -->
        <text x="250" y="32" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="20" fill="#c0392b" opacity="0.9" filter="url(#softGlow)">XII</text>

        <!-- Subtle numeral markers -->
        <text x="462" y="256" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="13" fill="#333">3</text>
        <text x="250" y="482" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="13" fill="#333">6</text>
        <text x="38" y="256" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="13" fill="#333">9</text>
      </svg>
    </div>

    <div class="countdown-display">
      <div class="big-number" id="secondsDisplay">100</div>
      <div class="unit-label">sec</div>
    </div>

    <div class="to-midnight">TO MIDNIGHT</div>

    <div class="footer-text" id="lastUpdated">LAST UPDATED —</div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────
    // This file is read by the admin panel and written by the server.
    // For pure static hosting, we read from clock-data.json.
    // Default fallback if no JSON found:
    let secondsToMidnight = 100;
    let lastUpdatedDate = null;

    // ── Draw tick marks ─────────────────────────────────────────────
    function buildTicks() {
      const g = document.getElementById('tickMarks');
      for (let i = 0; i < 60; i++) {
        const angle = (i / 60) * 360 - 90;
        const rad = angle * Math.PI / 180;
        const isMajor = i % 5 === 0;
        const r1 = isMajor ? 190 : 196;
        const r2 = 205;
        const x1 = 250 + r1 * Math.cos(rad);
        const y1 = 250 + r1 * Math.sin(rad);
        const x2 = 250 + r2 * Math.cos(rad);
        const y2 = 250 + r2 * Math.sin(rad);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', isMajor ? '#555' : '#2a2a2a');
        line.setAttribute('stroke-width', isMajor ? '2' : '1');
        g.appendChild(line);
      }
    }

    // ── Update clock hands ──────────────────────────────────────────
    function updateClock(seconds) {
      // Map seconds to clock positions:
      // 100 seconds = roughly 1m40s before midnight
      // We show minute hand approaching 12.
      // Max representable = 300s (5 min), min = 0s
      const MAX_SECONDS = 300;
      const clamped = Math.min(Math.max(seconds, 0), MAX_SECONDS);

      // Minute hand: points just before 12.
      // More seconds = further away (CCW from 12). Fewer seconds = closer to 12.
      // MAX_SECONDS (300s = 5min) maps to -30deg (i.e. 330deg, pointing at 11).
      // 0s maps to 0deg (pointing straight at 12).
      const minuteDeg = (360 - (clamped / MAX_SECONDS) * 30) % 360;

      // Hour hand: parked just before 12, moves very slightly with danger level
      const hourDeg = (360 - (clamped / MAX_SECONDS) * 6) % 360;

      document.getElementById('minuteHand').setAttribute('transform', `rotate(${minuteDeg}, 250, 250)`);
      document.getElementById('hourHand').setAttribute('transform', `rotate(${hourDeg}, 250, 250)`);

      // Progress arc: sweep from 12 going clockwise, showing "how close"
      // More danger = larger arc (approaching from the left toward 12)
      const dangerFraction = 1 - (clamped / MAX_SECONDS); // 0 = safe, 1 = midnight
      const arcDeg = dangerFraction * 90; // max 90 degree arc approaching midnight
      const arcRad = (arcDeg - 90) * Math.PI / 180;
      const r = 175;
      const endX = 250 + r * Math.cos(arcRad);
      const endY = 250 + r * Math.sin(arcRad);
      const largeArc = arcDeg > 180 ? 1 : 0;
      document.getElementById('progressArc').setAttribute(
        'd', `M 250 ${250 - r} A ${r} ${r} 0 ${largeArc} 1 ${endX} ${endY}`
      );
    }

    // ── Animate seconds display ─────────────────────────────────────
    function animateToValue(target) {
      const el = document.getElementById('secondsDisplay');
      const current = parseInt(el.textContent) || 0;
      const diff = target - current;
      const steps = 40;
      let step = 0;
      const interval = setInterval(() => {
        step++;
        const ease = step / steps;
        const val = Math.round(current + diff * (ease < 0.5 ? 2*ease*ease : -1+(4-2*ease)*ease));
        el.textContent = val;
        if (step >= steps) {
          el.textContent = target;
          clearInterval(interval);
        }
      }, 20);
    }

    // ── Load data ───────────────────────────────────────────────────
    async function loadData() {
      try {
        const res = await fetch('clock-data.json?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();
          const newSeconds = parseInt(data.seconds) || secondsToMidnight;
          if (newSeconds !== secondsToMidnight) {
            animateToValue(newSeconds);
            updateClock(newSeconds);
            secondsToMidnight = newSeconds;
          }
          if (data.updated) {
            lastUpdatedDate = new Date(data.updated);
            document.getElementById('lastUpdated').textContent =
              'LAST UPDATED — ' + lastUpdatedDate.toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'}).toUpperCase();
          }
        }
      } catch(e) {
        // Use defaults silently
      }
    }

    // ── Init ────────────────────────────────────────────────────────
    buildTicks();
    updateClock(secondsToMidnight);
    loadData();
    setInterval(loadData, 60000); // refresh every minute
  </script>
</body>
</html>
